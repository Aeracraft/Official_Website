name: Build & Deploy

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install & Build
        run: |
          npm ci
          npm run generate

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          echo "${{ secrets.DEPLOY_PRIVATE_KEY }}" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keyscan -p ${{ secrets.DEPLOY_SERVER_PORT }} ${{ secrets.DEPLOY_TO }} >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Deploy via rsync
        shell: bash
        run: |
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p ${{ secrets.DEPLOY_SERVER_PORT }}" \
            .output/public/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_TO }}:${{ secrets.DEPLOY_TARGET }}

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/deploy_key"
